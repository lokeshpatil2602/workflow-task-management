version: "3.9"

services:

  # ─────────────────────────────────────
  # MySQL Database
  # ─────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: workflow-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: workflow
    ports:
      - "3307:3306"          # host:3307 → container:3306 (avoids conflict with local MySQL)
    volumes:
      - db_data:/var/lib/mysql
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────
  # Node.js Backend
  # ─────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: workflow-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
      DB_NAME: workflow
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      BASE_URL: ${BASE_URL:-http://localhost}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────
  # React Frontend (nginx)
  # ─────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${BASE_URL:-http://localhost}
        VITE_SOCKET_URL: ${BASE_URL:-http://localhost}
    container_name: workflow-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  db_data:
  uploads_data:
